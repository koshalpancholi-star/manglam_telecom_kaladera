<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartphones Finder | Manglam Telecom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar" class="glass-nav">
        <div class="container nav-wrapper">
            <a href="index.html" class="logo"><span class="orange-text">Manglam</span>Telecom</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Products</a></li>
                <li><a href="offers.html">Offers</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding-top: 120px; min-height: 80vh;">
        <h1 class="section-title">Smartphone <span class="orange-text">Finder</span></h1>
        
        <div class="glass-card" style="padding: 20px; margin-bottom: 40px; display: flex; gap: 20px; flex-wrap: wrap;">
            <input type="text" id="searchInput" placeholder="Search models (e.g. iPhone, Galaxy)..." style="flex: 1; min-width: 200px; padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff;">
            <select id="brandFilter" style="padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff;">
                <option value="all">All Brands</option>
                <option value="apple">Apple</option>
                <option value="samsung">Samsung</option>
                <option value="vivo">vivo</option>
                <option value="oppo">OPPO</option>
                <option value="realme">realme</option>
            </select>
            <select id="budgetFilter" style="padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #fff;">
                <option value="all">Any Budget</option>
                <option value="under10k">Under ₹10,000</option>
                <option value="10k-20k">₹10,000 - ₹20,000</option>
                <option value="20k-30k">₹20,000 - ₹30,000</option>
                <option value="30kplus">₹30,000+</option>
            </select>
        </div>

        <div class="product-grid" id="productResults">
            <div class="product-card glass-card" data-brand="apple" data-price="30kplus">
                <div class="badges"><span class="badge new">NEW</span><span class="badge five-g">5G</span></div>
                <div class="img-container"><i class="fas fa-mobile-alt fa-5x" style="color: var(--primary-orange);"></i></div>
                <h3>iPhone 15 Pro Max</h3>
                <p class="emi-text"><i class="fas fa-check-circle"></i> Easy EMI Available</p>
                <div class="card-actions">
                    <a href="tel:+919799007841" class="btn btn-sm btn-outline">Call Now</a>
                </div>
            </div>
            <div class="product-card glass-card" data-brand="samsung" data-price="30kplus">
                <div class="badges"><span class="badge five-g">5G</span></div>
                <div class="img-container"><i class="fas fa-mobile-alt fa-5x" style="color: #007aff;"></i></div>
                <h3>Samsung Galaxy S24 Ultra</h3>
                <p class="emi-text"><i class="fas fa-check-circle"></i> Easy EMI Available</p>
                <div class="card-actions">
                    <a href="tel:+919799007841" class="btn btn-sm btn-outline">Call Now</a>
                </div>
            </div>
            <div class="product-card glass-card" data-brand="realme" data-price="10k-20k">
                <div class="badges"><span class="badge five-g">5G</span></div>
                <div class="img-container"><i class="fas fa-mobile-alt fa-5x" style="color: #ffaa00;"></i></div>
                <h3>realme Narzo 60</h3>
                <p class="emi-text"><i class="fas fa-check-circle"></i> EMI Starts at ₹999</p>
                <div class="card-actions">
                    <a href="tel:+919799007841" class="btn btn-sm btn-outline">Call Now</a>
                </div>
            </div>
        </div>
    </main>

    <div class="mobile-bottom-nav glass-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="products.html" class="active"><i class="fas fa-mobile-alt"></i><span>Phones</span></a>
        <a href="offers.html"><i class="fas fa-tags"></i><span>Offers</span></a>
        <a href="contact.html"><i class="fas fa-map-marker-alt"></i><span>Locate</span></a>
    </div>

    <script src="js/products.js"></script>
</body>
</html>
